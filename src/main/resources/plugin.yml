name: WorldBoss
version: 1.0.0
# Compatibility: plugin version 1.0.0 targets Paper 1.21.10
# Runtime target: Paper 1.21.10 + JDK 21
main: com.worldboss.WorldBossPlugin
api-version: '1.21'
author: Codex
commands:
  boss:
    description: World boss controls
    usage: /boss <ready|exit|claim|info|skip|spawn|respawn>
  money:
    description: Show balance and transfer money
    usage: /money [send <nick> <count>]
  balance:
    description: Show your balance
    usage: /balance
permissions:
  worldboss.admin:
    default: op
